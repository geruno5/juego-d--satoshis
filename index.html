<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Lanza y Gana Satoshis!</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            align-items: flex-start;
            justify-content: center;
        }
        .container {
            text-align: center;
            flex: 1;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 600px;
        }
        .col-derecha {
            width: 320px;
            min-height: 600px;
            background: #1e1e1e;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .reglas {
            color: #cccccc;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        .btn-video {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 5px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-video:hover { background-color: #007a80; }
        .contador-videos {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 30px;
        }
        .dado-container {
            font-size: 4rem;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        .girando {
            animation: ruletaSuave 0.4s infinite ease-in-out;
        }
        @keyframes ruletaSuave {
            0% { transform: scale(1); color: #ffd700; filter: drop-shadow(0 0 5px #ffd700); }
            50% { transform: scale(1.15); color: #ff5722; filter: drop-shadow(0 0 15px #ff5722); }
            100% { transform: scale(1); color: #ffd700; filter: drop-shadow(0 0 5px #ffd700); }
        }
        .btn-lanzar {
            background-color: #ffd700;
            color: #111;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.1s, background 0.2s;
        }
        .btn-lanzar:hover { background-color: #e6c200; }
        .btn-lanzar:active { transform: scale(0.95); }
        .btn-lanzar:disabled { background-color: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        .marcador {
            margin-top: 25px;
            font-size: 1.2rem;
            background: #282828;
            padding: 12px;
            border-radius: 8px;
        }
        #satoshis-count { color: #4caf50; font-weight: bold; }
        .seccion-retiro {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
            text-align: left;
        }
        .seccion-retiro h3 {
            margin-top: 0;
            color: #ffd700;
            font-size: 1.1rem;
        }

        /* Responsive para celulares */
        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
            }
            .col-derecha {
                width: 100%;
                max-width: 320px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <!-- Contenedor del Juego Principal -->
        <div class="container">
            <h1>🎲 ¡Lanza el Dado y Gana!</h1>
            <p class="reglas">Saca un número mayor o igual a 4 para ganar 2 Satoshis. Puedes lanzar cada 5 minutos.</p>

            <button class="btn-video" id="btnVideo">📺 Ver Video (+3 Sats)</button>
            <div class="contador-videos">Videos vistos hoy: <span id="video-count">0</span>/5</div>

            <div class="dado-container" id="dado">?</div>
            <button class="btn-lanzar" id="btnLanzar">¡Lanzar Dado!</button>

            <div class="marcador">
                Tu Balance Total: <span id="satoshis-count">0</span> Satoshis
            </div>

            <!-- Sección de Retiro Blindada -->
            <div class="seccion-retiro">
                <h3>💳 Solicitar Extracción</h3>
                <form id="formRetiro" action="https://formspree.io" method="POST" style="display: flex; flex-direction: column; gap: 10px;">
                    
                    <input type="hidden" name="Satoshis_A_Retirar" id="formSats" value="0">
                    
                    <select id="wallet-select" name="Tipo_Billetera" style="padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white;">
                        <option value="speed">Speed Wallet (Lightning Address)</option>
                        <option value="bitso">Bitso (Dirección Bitcoin / Red Principal)</option>
                    </select>
                    
                    <input type="text" name="Direccion_Billetera" id="wallet-address" placeholder="Introduce tu dirección de cobro" required style="padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252525; color: white;">
                    
                    <button type="submit" class="btn-lanzar" style="font-size: 1rem; padding: 12px; margin-top: 5px;">
                        Enviar Solicitud (Mín. 20 Sats)
                    </button>
                </form>
            </div>
        </div>

        <!-- Columna de Anuncios Derecha (¡Tu anuncio está aquí!) -->
        <div class="col-derecha">
            <iframe data-aa='2441753' src='//://a-ads.com' style='border:0; padding:0; width:300px; height:600px; overflow:hidden; display: block; margin: auto;'></iframe>
        </div>
    </div>

    <script>
        let totalSatoshis = parseInt(localStorage.getItem('satoshis')) || 0;
        let conteoVideos = parseInt(localStorage.getItem('conteoVideos')) || 0;
        let ultimoLanzamiento = parseInt(localStorage.getItem('ultimoLanzamiento')) || 0;

        const dado = document.getElementById('dado');
        const btnLanzar = document.getElementById('btnLanzar');
        const satoshisCount = document.getElementById('satoshis-count');
        const btnVideo = document.getElementById('btnVideo');
        const videoCountDisplay = document.getElementById('video-count');

        satoshisCount.textContent = totalSatoshis;
        videoCountDisplay.textContent = conteoVideos;

        function guardarDatos() {
            localStorage.setItem('satoshis', totalSatoshis);
            localStorage.setItem('conteoVideos', conteoVideos);
            localStorage.setItem('ultimoLanzamiento', ultimoLanzamiento);
        }

        function verificarTemporizador() {
            const ahora = Date.now();
            const tiempoTranscurrido = ahora - ultimoLanzamiento;
            const tiempoEspera = 5 * 60 * 1000;

            if (tiempoTranscurrido < tiempoEspera) {
                btnLanzar.disabled = true;
                const tiempoRestante = Math.ceil((tiempoEspera - tiempoTranscurrido) / 1000);
                actualizarBotonTiempo(tiempoRestante);
            } else {
                btnLanzar.disabled = false;
                btnLanzar.textContent = "¡Lanzar Dado!";
            }
        }

        function actualizarBotonTiempo(segundos) {
            const minutos = Math.floor(segundos / 60);
            const segsRestantes = segundos % 60;
            btnLanzar.textContent = `Espera ${minutos}:${segsRestantes < 10 ? '0' : ''}${segsRestantes}`;
            
            const intervalo = setInterval(() => {
                const ahora = Date.now();
                const restante = Math.ceil((5 * 60 * 1000 - (ahora - ultimoLanzamiento)) / 1000);
                
                if (restante <= 0) {
                    clearInterval(intervalo);
                    btnLanzar.disabled = false;
                    btnLanzar.textContent = "¡Lanzar Dado!";
                } else {
                    const m = Math.floor(restante / 60);
                    const s = restante % 60;
                    btnLanzar.textContent = `Espera ${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        btnLanzar.onclick = function() {
            btnLanzar.disabled = true;
            ultimoLanzamiento = Date.now();
            dado.classList.add('girando');
            dado.textContent = "🎲";

            setTimeout(() => {
                dado.classList.remove('girando');
                const resultado = Math.floor(Math.random() * 6) + 1;
                dado.textContent = resultado;

                if (resultado >= 4) {
                    totalSatoshis += 2;
                    satoshisCount.textContent = totalSatoshis;
                    alert(`🎉 ¡Sacaste un ${resultado}! Ganaste 2 Satoshis.`);
            } else {
                alert(`😢 Sacaste un ${resultado}. Inténtalo de nuevo en 5 minutos.`);
            }
            guardarDatos();
            verificarTemporizador();
        }, 2000);
    };

    btnVideo.onclick = function() {
        if (conteoVideos >= 5) {
            alert("❌ Has alcanzado el límite diario de videos por hoy.");
            return;
        }
        btnVideo.disabled = true;
        btnVideo.textContent = "Cargando anuncio...";
        setTimeout(() => {
            conteoVideos++;
            totalSatoshis += 3;
            satoshisCount.textContent = totalSatoshis;
            videoCountDisplay.textContent = conteoVideos;
            btnVideo.disabled = false;
            btnVideo.textContent = "📺 Ver Video (+3 Sats)";
            alert("💎 ¡Gracias por apoyar la plataforma! Se te han acreditado +3 Satoshis.");
            guardarDatos();
        }, 3000);
    };

    // ENVIAR POR DETRÁS (AJAX) - EVITA LA PÁGINA DE ERROR POR COMPLETO
    document.getElementById('formRetiro').addEventListener('submit', function(event) {
        event.preventDefault();
        if (totalSatoshis < 20) {
            alert("❌ Error: Necesitas acumular al menos 20 Satoshis para poder solicitar un retiro.");
            return;
        }
        document.getElementById('formSats').value = totalSatoshis;
        let formData = new FormData(this);
        fetch(this.action, {
            method: this.method,
            body: formData,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (response.ok) {
                alert("🚀 ¡Solicitud enviada! Procesaremos tu pago manualmente en tu Wallet tras revisar las impresiones.");
                totalSatoshis = 0;
                satoshisCount.textContent = totalSatoshis;
                guardarDatos();
            } else {
                alert("❌ Hubo un problema con el servidor de retiros. Inténtalo más tarde.");
            }
        }).catch(error => {
            alert("❌ Error de conexión de red. Inténtalo de nuevo.");
        });
    });
    verificarTemporizador();
